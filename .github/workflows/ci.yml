name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build for Pages
      run: npm run build

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: Get commit count
      id: vars
      run: echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

    - name: Configure Server Environment
      run: |
        echo "VITE_API_BASE_URL=/dpv" > .env.production
        echo "VITE_TEST_ENVIRONMENT=false" >> .env.production
        echo "VITE_APP_VERSION=${{ steps.vars.outputs.count }}" >> .env.production

    - name: Build for Server Release
      run: npm run build

    - name: Package Release
      run: tar -czvf dpv-ui-release-v${{ steps.vars.outputs.count }}.tar.gz -C dist .

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.vars.outputs.count }}"
        name: "Release v${{ steps.vars.outputs.count }}"
        files: dpv-ui-release-v${{ steps.vars.outputs.count }}.tar.gz
        make_latest: true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
